name: Build

on:
  push:
    tags:
      - '*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Update CHANGELOG
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          external-cache: true
      - name: Build
        run: |
          for arch in darwin_arm64 darwin_amd64 linux_arm64 linux_amd64; do
            echo "Building flx_${arch} ${{ github.ref_name }}"
            # Cross compile FLX and injection version string.
            bazel build \
              --platforms=@rules_go//go/toolchain:${arch} \
              --stamp \
              --workspace_status_command="echo STABLE_STAMP_VERSION ${{ github.ref_name }}" \
              //:flx
            echo "Creating flx_${arch}.tar.gz"
            tar -czvf flx_${arch}.tar.gz -C bazel-bin/flx_/ flx
          done
      - name: Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ github.ref_name }}
          artifacts: "*.tar.gz"
          makeLatest: 'true'
          allowUpdates: true
          draft: false
          body: ${{ steps.changelog.outputs.changes }}
